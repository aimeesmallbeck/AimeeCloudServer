<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Invite - AimeeCloud</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #4fc3f7 0%, #00979D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .subtitle {
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
            font-size: 14px;
        }
        .info {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #4fc3f7; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00979D, #007a7f);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,151,157,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .back-link {
            display: block;
            margin-top: 24px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #fff; }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo" onclick="window.location.href='/'">AimeeCloud</div>
        <div class="subtitle">Request an Invite</div>
        <div class="info">
            AimeeCloud is currently in early access.<br>
            Submit your email and we'll send you an invite once approved.
        </div>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        <form id="inviteForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" id="submitBtn">Request Invite</button>
        </form>
        <a href="/login.html" class="back-link">← Already have access? Sign In</a>
    </div>

    <script>
        document.getElementById('inviteForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('submitBtn');
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Submitting...';
            
            try {
                const res = await fetch('/aimeecloud-api/invites', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if (res.ok) {
                    if (data.already_exists) {
                        successEl.textContent = 'You already have a pending request. We\'ll be in touch soon!';
                    } else {
                        successEl.textContent = 'Thanks! Your invite request has been submitted.';
                    }
                    successEl.style.display = 'block';
                    document.getElementById('email').value = '';
                } else {
                    errorEl.textContent = data.error || 'Something went wrong. Please try again.';
                    errorEl.style.display = 'block';
                }
            } catch {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Request Invite';
            }
        });
    </script>
</body>
</html>
